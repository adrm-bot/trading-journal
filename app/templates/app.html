<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>매매일지</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/app.css">
</head><body>
<a class="sr-only" href="#main">본문 바로가기</a>
<div class="shell" id="shell">
  <aside class="side">
    <div class="brand">📓 매매일지</div>
    <nav class="nav" aria-label="주 메뉴">
      <a href="#dashboard" data-view="dashboard"><span class="ic" aria-hidden="true">📊</span>대시보드</a>
      <a href="#journal" data-view="journal"><span class="ic" aria-hidden="true">📒</span>거래</a>
      <a href="#insights" data-view="insights"><span class="ic" aria-hidden="true">🧠</span>인사이트</a>
      <a href="#settings" data-view="settings"><span class="ic" aria-hidden="true">⚙️</span>설정</a>
    </nav>
    <div class="foot"><div class="email" id="email">—</div><a href="/logout">로그아웃</a></div>
  </aside>
  <main class="main" id="main">
    <div class="topbar">
      <div><h1 id="title">대시보드</h1><div class="desc" id="desc"></div></div>
      <div id="actions"></div>
    </div>
    <div id="pullbanner"></div>
    <div class="content">
      <section id="view-dashboard" class="view" aria-live="polite"></section>
      <section id="view-journal" class="view" hidden></section>
      <section id="view-insights" class="view" hidden></section>
      <section id="view-settings" class="view" hidden></section>
    </div>
  </main>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalMeta">
  <h3 id="modalTitle">거래 상세 · 사후 의도</h3><div class="meta" id="modalMeta"></div>
  <div class="facts" id="modalFacts"></div>
  <div class="field"><label for="f_plan">계획/의도 — 왜 들어갔나</label><textarea id="f_plan" placeholder="예: 0.087 지지선 반등 베팅, 4시간 추세 눌림목"></textarea></div>
  <div class="hh">한 줄만 적어도 기록됩니다 — 칩을 탭해서 빠르게 채워도 돼요.</div>
  <div class="field"><label>감정</label><div class="chips" id="c_emo"></div></div>
  <details class="more" id="moreFields"><summary>전략 · 근거 · 예상 손절/익절 · 메모 추가</summary>
    <div class="field"><label>진입전략 <span class="muted">· 하나 선택</span></label><div class="chips" id="c_strategy"></div></div>
    <div class="field"><label>진입근거 <span class="muted">· 여러 개 탭</span></label><div class="chips" id="c_setup"></div>
      <input id="f_setup_etc" placeholder="기타 근거 직접 입력 (선택)" style="margin-top:6px"></div>
    <div class="row3">
      <div class="field"><label for="f_sl">예상 손절가 (SL)</label><input id="f_sl" type="number" step="any" placeholder="0.086"></div>
      <div class="field"><label for="f_tp">예상 익절가1 (TP1)</label><input id="f_tp" type="number" step="any" placeholder="0.092"></div>
      <div class="field"><label for="f_tp2">예상 익절가2 (TP2)</label><input id="f_tp2" type="number" step="any" placeholder="0.098"></div>
    </div>
    <div class="rr-line" id="rrLine"></div>
    <div class="field"><label for="f_memo">메모</label><textarea id="f_memo" placeholder="물려서 분할로 던짐 / 손절 못 지킴…"></textarea></div>
  </details>
  <div class="modal-actions"><button class="btn ghost" id="cancelBtn">취소</button><button class="btn primary" id="saveBtn">저장 · 기록완료</button></div>
</div></div>

<div class="modal-bg" id="bulkBg"><div class="modal" role="dialog" aria-modal="true" aria-labelledby="bulkTitle">
  <h3 id="bulkTitle">미기입 거래 일괄 기입</h3><div class="meta" id="bulkMeta"></div>
  <div class="field"><label for="b_plan">계획/메모 — 전체에 동일 적용</label><textarea id="b_plan">사후 일괄 정리 — 당시 계획 미기록</textarea></div>
  <div class="field"><label>진입전략 <span class="muted">· 선택 (비우면 전략통계 영향 없음)</span></label><div class="chips" id="cb_strategy"></div></div>
  <div class="field"><label>감정 <span class="muted">· 선택</span></label><div class="chips" id="cb_emo"></div></div>
  <p class="muted" style="font-size:12px;margin:2px 0 0">과거 미기입 거래를 한 번에 '기록완료'로 정리합니다. 정직한 통계를 위해 전략은 비워두길 권장 — 새 거래는 개별 기입하세요.</p>
  <div class="modal-actions"><button class="btn ghost" id="bulkCancel">취소</button><button class="btn primary" id="bulkSave">전체 적용</button></div>
</div></div>

<div id="toast" role="status" aria-live="polite" style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--plate);border:1px solid var(--line-2);color:var(--ice);padding:10px 16px;border-radius:8px;box-shadow:var(--card-elev);display:none;z-index:50;font-size:13px"></div>

<script>
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
let DATA={summary:{},trades:[]}, CONN=[], EDIT=null, LAST_FOCUS=null, SAVING=false;
let MARKET=null, MKT_LOADING=false, OPENPOS=null, POS_LOADING=false;
let JT={from:'',to:'',q:'',exchange:'all',dir:'all',status:'all',sortKey:'closed_at',sortDir:'desc',page:1,size:25,view:'cards'}, jtDebounce;
const money=n=>n==null?"—":(Number(n)>=0?"+":"")+Number(n).toFixed(2);
const fmtP=n=>(n==null||n==='')?'<span class="muted">—</span>':Number(n).toLocaleString(undefined,{maximumFractionDigits:8});
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const EXCH=new Set(["bybit","binance","gate"]);
/* 의도 입력 칩(탭 선택형) taxonomy */
const STRATS=["추세추종","눌림목(되돌림)","돌파(브레이크아웃)","역추세(리버설)","레인지(박스)","스캘핑","뉴스·이벤트","기타"];
const RATIONALES=["추세선","다이버전스","거래량 급증","캔들패턴","차트패턴","지지·저항","이평선(EMA존)","전고/전저","피보나치","오더블록·유동성","펀딩·롱숏비","상대강도(BTC대비)","뉴스·재료","직감·근거없음"];
const EMOS=["차분","확신","조급(FOMO)","공포","탐욕","복수심","지루함","주저(망설임)"];
function chipsInto(id,opts,multi){const el=$("#"+id);if(!el)return;el.dataset.multi=multi?"1":"0";
  el.innerHTML=opts.map(v=>`<button type="button" class="btn sm fchip" data-val="${esc(v)}">${esc(v)}</button>`).join("");
  el.onclick=ev=>{const b=ev.target.closest(".fchip");if(!b)return;
    if(el.dataset.multi==="1"){if(b.getAttribute("aria-current"))b.removeAttribute("aria-current");else b.setAttribute("aria-current","page");}
    else{const on=b.getAttribute("aria-current");el.querySelectorAll(".fchip").forEach(x=>x.removeAttribute("aria-current"));if(!on)b.setAttribute("aria-current","page");}};}
function getChips(id){const el=$("#"+id);return el?[...el.querySelectorAll('.fchip[aria-current="page"]')].map(b=>b.dataset.val):[];}
function setChips(id,vals){const el=$("#"+id);if(!el)return [];const set=new Set(vals||[]),known=new Set();
  el.querySelectorAll(".fchip").forEach(b=>{if(set.has(b.dataset.val)){b.setAttribute("aria-current","page");known.add(b.dataset.val);}else b.removeAttribute("aria-current");});
  return (vals||[]).filter(v=>!known.has(v));}
let toastT;
function toast(msg){const t=$("#toast");t.textContent=msg;t.style.display="block";clearTimeout(toastT);toastT=setTimeout(()=>t.style.display="none",3200);}

async function api(path,opt){
  const r=await fetch(path,opt);
  if(r.status===401){location.href="/login";throw new Error("auth");}
  if(!r.ok){let msg="http "+r.status;try{const j=await r.clone().json();if(j&&j.detail)msg=j.detail;}catch(_){}throw new Error(msg);}
  return r;
}
function postJSON(path,body){return api(path,{method:"POST",headers:{"Content-Type":"application/json","X-Requested-With":"fetch"},body:JSON.stringify(body||{})});}

/* 로딩 스켈레톤 */
function skelCards(n){return '<div class="cards">'+Array(n||4).fill('<div class="skel-card"><div class="skel skel-line sm"></div><div class="skel skel-line lg"></div></div>').join('')+'</div>';}
function skelRows(n){return '<div class="skel-rows">'+Array(n||6).fill('<div class="skel skel-row"></div>').join('')+'</div>';}
function skelMarket(){return '<div class="market">'+Array(4).fill('<div class="skel-card"><div class="skel skel-line sm"></div><div class="skel skel-line"></div></div>').join('')+'</div>';}
function paintBootSkeleton(){const el=$("#view-dashboard");if(!el)return;el.hidden=false;el.innerHTML=skelMarket()+skelCards(4)+'<div class="section-title">최근 거래</div>'+skelRows(6);}
const curView=()=>{const v=location.hash.replace("#","")||"dashboard";return (typeof VIEWS!=='undefined'&&VIEWS[v])?v:"dashboard";};

const VIEWS={
  dashboard:{title:"대시보드",desc:"오늘의 거래와 행동 패턴 개요",actions:pullActions,render:renderDashboard},
  journal:{title:"거래",desc:"전체 거래 · 계획 사후 입력",actions:pullActions,render:renderJournal},
  insights:{title:"인사이트",desc:"행동 패턴과 종목별 성과",actions:()=>"",render:renderInsights},
  settings:{title:"설정",desc:"거래소·Notion·Sheets·Telegram 연동",actions:()=>"",render:renderSettings},
};
function pullActions(){return `<button class="btn" id="pullBtn">↻ 적재</button> <button class="btn primary" id="refreshBtn" style="margin-left:8px">새로고침</button>`;}

async function loadAll(){
  const [me,data,conn]=await Promise.all([
    api("/api/me").then(r=>r.json()), api("/api/data").then(r=>r.json()), api("/api/connections").then(r=>r.json())]);
  $("#email").textContent=me.email||""; DATA=data; CONN=conn.connected||[];
}
function route(){
  const v=(location.hash.replace("#","")||"dashboard"); const view=VIEWS[v]?v:"dashboard";
  $$(".nav a").forEach(a=>{if(a.dataset.view===view)a.setAttribute("aria-current","page");else a.removeAttribute("aria-current");});
  $("#title").textContent=VIEWS[view].title; $("#desc").textContent=VIEWS[view].desc;
  $("#actions").innerHTML=VIEWS[view].actions();
  $$(".view").forEach(s=>s.hidden=true); $("#view-"+view).hidden=false;
  VIEWS[view].render($("#view-"+view));
  if($("#pullBtn"))$("#pullBtn").onclick=pull; if($("#refreshBtn"))$("#refreshBtn").onclick=refresh;
}
async function refresh(){const v=curView(),host=$("#view-"+v);if(host)host.innerHTML=v==='journal'?skelRows(8):skelCards(4)+skelRows(6);
  try{await loadAll();route();}catch(e){toast("불러오기 실패 — 잠시 후 다시");}}

/* ---------- views ---------- */
function statCards(s){
  const n=s.n||0, dates=DATA.trades.map(t=>trDate(t)).filter(Boolean).sort();
  const range=dates.length?`${dates[0]} ~ ${dates[dates.length-1]}`:"청산 완료 기준";
  const avg=n?(s.total_pnl||0)/n:0;
  const c=[
    ["총 거래",n+"건","",range],
    ["실현손익",money(s.total_pnl)+" USDT",(s.total_pnl||0)>=0?"pos":"neg","거래당 "+money(avg)],
    ["승률",n?Math.round((s.win_rate||0)*100)+"%":"—","",n?(s.wins||0)+"승 "+(n-(s.wins||0))+"패":""],
    ["의도 미기입",(s.unplanned||0)+"건",(s.unplanned||0)>0?"neg":"",n?Math.round((s.unplanned||0)/n*100)+"% 미기입":""]];
  return `<div class="cards">`+c.map(x=>`<div class="card stat"><div class="label">${x[0]}</div><div class="val ${x[2]}">${x[1]}</div>${x[3]?`<div class="msub">${esc(x[3])}</div>`:""}</div>`).join("")+`</div>`;
}
function flagsBlock(s){
  const fl=s.flags||[]; if(!fl.length)return"";
  return `<div class="flags">`+fl.map(f=>{const o=(typeof f==='string')?{level:'warn',text:f}:f;
    const ic=o.level==='warn'?'⚠':o.level==='good'?'✓':'•';
    return `<div class="flag ${esc(o.level||'info')}"><span class="fi" aria-hidden="true">${ic}</span><span>${esc(o.text)}</span></div>`;}).join("")+`</div>`;
}
function onboarding(){
  const hasExch=CONN.some(k=>EXCH.has(k));
  return `<div class="empty"><div class="em" aria-hidden="true">${hasExch?"🌱":"🔌"}</div>
    <h2>${hasExch?"아직 거래가 없어요":"거래소를 연결하면 시작돼요"}</h2>
    <p>${hasExch?"최근 거래가 잡히면 여기 자동으로 들어옵니다. 지금 한번 긁어볼까요?":"read-only 키만 연결하면 청산 거래가 자동으로 일지에 들어오고, 계획 없던 거래는 따로 잡아둡니다."}</p>
    ${hasExch?`<button class="btn primary" id="emptyPull">↻ 거래 적재</button>`:`<a class="btn primary" href="#settings">거래소 연결하기</a>`}</div>`;
}
function tradeRows(rows){
  return rows.map(r=>{
    const dir=r.direction?`<span class="badge ${r.direction==='Long'?'long':'short'}">${esc(r.direction)}</span>`:"—";
    const st=r.status==='의도 미기입'?`<span class="badge pending">의도 미기입</span>`:`<span class="badge done">${esc(r.status||'기록')}</span>`;
    const rcell=r.r==null?'<span class="muted">—</span>':`<span class="${r.r>=0?'pos':'neg'}">${(r.r>=0?'+':'')+r.r}R</span>`;
    const liq=r.liquidated?` <span class="badge liq" title="강제청산/ADL">⚡청산</span>`:'';
    const lev=r.leverage?` <span class="ex">${r.leverage}x</span>`:'';
    return `<tr><td class="num">${esc((toKST(r.closed_at)||{}).str||'')}</td>
      <td>${esc(r.symbol)} <span class="ex">${esc(r.exchange)}</span>${lev}${liq}</td><td>${dir}</td>
      <td class="num">${fmtP(r.entry)}</td><td class="num">${fmtP(r.exit)}</td>
      <td class="num ${(r.pnl||0)>=0?'pos':'neg'}">${money(r.pnl)}</td><td class="num">${rcell}</td><td>${st}</td>
      <td><button class="btn sm editBtn" data-id="${esc(r.trade_id)}">${r.plan?'편집':'채우기'}</button></td></tr>`;
  }).join("");
}
const TCOLS=[['closed_at','청산시각(KST)','num'],['symbol','심볼',''],['direction','방향',''],
  ['entry','진입가','num'],['exit','청산가','num'],['pnl','손익','num'],['r','R','num'],['status','상태','']];
function table(rows,opts){
  opts=opts||{};
  const th=TCOLS.map(c=>{
    if(!opts.sortable)return `<th class="${c[2]}">${c[1]}</th>`;
    const on=JT.sortKey===c[0], arr=on?(JT.sortDir==='desc'?'▼':'▲'):'';
    return `<th class="${c[2]} sortable" data-sort="${c[0]}" aria-sort="${on?(JT.sortDir==='desc'?'descending':'ascending'):'none'}">${c[1]}<span class="sarr">${arr}</span></th>`;
  }).join('')+`<th></th>`;
  return `<div class="table-wrap"><table><thead><tr>${th}</tr></thead><tbody>${tradeRows(rows)}</tbody></table></div>`;
}
function bindEdit(){$$(".editBtn").forEach(b=>b.onclick=()=>openModal(b.dataset.id));}
/* ---------- 일지 피드(카드): 반성 내용을 클릭 없이 노출 ---------- */
const EXR={sl_hit:["⛔ SL적중","neg"],tp_hit:["🎯 TP적중","pos"],trailing:["🎯 트레일링","pos"],manual:["✋ 수동","muted"],liquidation:["⚡ 강제청산","neg"]};
function exitBadge(r){const x=EXR[r.exit_reason];return x?`<span class="badge xr ${x[1]}">${x[0]}</span>`:"";}
function tagChips(r){
  const out=[];
  if(r.strategy)out.push(`<span class="rtag strat">${esc(r.strategy)}</span>`);
  (r.setup||"").split(",").map(s=>s.trim()).filter(Boolean).forEach(t=>out.push(`<span class="rtag">${esc(t)}</span>`));
  if(r.emotion)out.push(`<span class="rtag emo">${esc(r.emotion)}</span>`);
  return out.join("");
}
function tradeCard(r){
  const dir=r.direction?`<span class="badge ${r.direction==='Long'?'long':'short'}">${esc(r.direction)}</span>`:"";
  const liq=(r.liquidated&&!r.exit_reason)?` <span class="badge liq">⚡청산</span>`:"";
  const xr=exitBadge(r)?" "+exitBadge(r):"";
  const rcell=r.r==null?"":` <span class="${r.r>=0?'pos':'neg'}">${(r.r>=0?'+':'')+r.r}R</span>`;
  const lev=r.leverage?` <span class="ex">${r.leverage}x</span>`:"";
  const pending=r.status==='의도 미기입';
  let body;
  if(pending){body=`<button class="btn sm jfill">✏️ 왜 들어갔는지 채우기</button>`;}
  else{const t=tagChips(r);
    body=(t?`<div class="jtags">${t}</div>`:"")
      +(r.plan?`<div class="jplan">${esc(r.plan)}</div>`:"")
      +(r.memo?`<div class="jmemo">“${esc(r.memo)}”</div>`:"")
      +((!t&&!r.plan&&!r.memo)?`<div class="jmemo">탭해서 계획·근거·감정 채우기</div>`:"");}
  const mv=r.move_pct==null?"":` · <span class="${r.move_pct>=0?'pos':'neg'}">${(r.move_pct>=0?'+':'')+r.move_pct}%</span>`;
  const risk=r.risk_usd?` · 리스크 <b>$${Math.round(r.risk_usd).toLocaleString()}</b>`:"";
  const stats=`<div class="jstats">진입 <b>${fmtP(r.entry)}</b> → 청산 <b>${fmtP(r.exit)}</b> · 수량 ${fmtP(r.qty)}${mv}${risk}</div>`;
  return `<div class="jcard ${pending?'pend':''}" data-id="${esc(r.trade_id)}">
    <div class="jhead"><div class="jhl">${dir} <b>${esc(r.symbol)}</b> <span class="ex">${esc(r.exchange)}</span>${lev}${liq}${xr} <span class="jt">${esc((toKST(r.closed_at)||{}).str||'')}</span></div>
      <div class="jhr"><span class="${(r.pnl||0)>=0?'pos':'neg'}">${money(r.pnl)}</span>${rcell}</div></div>
    ${stats}${body}</div>`;
}
function journalCards(rows){return `<div class="jfeed">`+rows.map(tradeCard).join("")+`</div>`;}
function bindCards(){$$(".jcard").forEach(c=>c.onclick=()=>openModal(c.dataset.id));}

/* ---------- 시장 컨텍스트 스트립 ---------- */
const TREND={up:["▲","상승","pos"],down:["▼","하락","neg"],side:["▬","횡보","muted"]};
function chgTxt(v){return v==null?"":`<span class="${v>=0?'pos':'neg'}">${(v>=0?'+':'')+v}%</span>`;}
function usd(n){return n==null?"—":"$"+Number(n).toLocaleString(undefined,{maximumFractionDigits:n<10?4:0});}
function fngKo(v){if(v==null)return["—","muted"];if(v<25)return["극단적 공포","neg"];if(v<45)return["공포","neg"];if(v<=55)return["중립","muted"];if(v<=75)return["탐욕","pos"];return["극단적 탐욕","pos"];}
function mchip(label,main,sub,cls){return `<div class="mchip"><div class="mk">${label}</div><div class="mv ${cls||''}">${main}</div>${sub?`<div class="ms">${sub}</div>`:""}</div>`;}
function marketStrip(m){
  if(!m)return `<div class="market" id="marketStrip"><div class="mchip skel">시장 데이터 불러오는 중…</div></div>`;
  const chips=[];
  if(m.btc){const t=TREND[m.btc.trend]||["·","—","muted"];
    chips.push(mchip("비트코인 추세",`<span class="${t[2]}">${t[0]} ${t[1]}</span>`,`${usd(m.btc.price)} · 24h ${chgTxt(m.btc.chg24)}`));}

/* ---------- 성과 분석 ---------- */
function num(v){return Number(v)||0;}
/* 서버는 UTC로 저장 → 화면·집계는 전부 KST(UTC+9)로 변환(한국 트레이더의 '하루'·세션 정합) */
const KST_OFF=9*3600000;
function toKST(s){
  if(!s)return null;
  const d=new Date(s.replace(' ','T')+'Z'); if(isNaN(d))return null;
  const k=new Date(d.getTime()+KST_OFF), p=n=>String(n).padStart(2,'0');
  return {date:`${k.getUTCFullYear()}-${p(k.getUTCMonth()+1)}-${p(k.getUTCDate())}`,hour:k.getUTCHours(),
    str:`${k.getUTCFullYear()}-${p(k.getUTCMonth()+1)}-${p(k.getUTCDate())} ${p(k.getUTCHours())}:${p(k.getUTCMinutes())}`};
}
function trDate(t){const k=toKST(t.closed_at);return k?k.date:'';}
function trHour(t){const k=toKST(t.closed_at);return k?k.hour:null;}
function perfMetrics(ts){
  const pnls=ts.map(t=>num(t.pnl)), n=ts.length;
  const wins=pnls.filter(p=>p>0), losses=pnls.filter(p=>p<0);
  const sum=pnls.reduce((a,b)=>a+b,0);
  const avgWin=wins.length?wins.reduce((a,b)=>a+b,0)/wins.length:0;
  const avgLoss=losses.length?losses.reduce((a,b)=>a+b,0)/losses.length:0;
  const grossWin=wins.reduce((a,b)=>a+b,0), grossLoss=losses.reduce((a,b)=>a+b,0);
  const pf=grossLoss?Math.abs(grossWin/grossLoss):(grossWin?Infinity:0);
  const rs=ts.map(t=>t.r).filter(r=>r!=null);
  const avgR=rs.length?rs.reduce((a,b)=>a+b,0)/rs.length:null;
  const ord=[...ts].sort((a,b)=>(a.closed_at||'')<(b.closed_at||'')?-1:1);
  let cum=0,peak=0,mdd=0; ord.forEach(t=>{cum+=num(t.pnl);peak=Math.max(peak,cum);mdd=Math.min(mdd,cum-peak);});
  const fees=ts.reduce((a,t)=>a+num(t.fees),0), funding=ts.reduce((a,t)=>a+num(t.funding),0);
  const wr=n?wins.length/n:0, payoff=avgLoss?Math.abs(avgWin/avgLoss):0;
  const kelly=payoff?(wr-(1-wr)/payoff):0;  // 최적 베팅비중(프랙셔널 켈리 권장)
  return {n,sum,winRate:wr,avgWin,avgLoss,pf,exp:n?sum/n:0,avgR,rsN:rs.length,mdd,fees,funding,gross:sum+fees,net:sum+funding,payoff,kelly};
}

function equitySVG(ts){
  const ord=[...ts].sort((a,b)=>(a.closed_at||'')<(b.closed_at||'')?-1:1);
  let cum=0; const pts=ord.map(t=>cum+=num(t.pnl));

  const X=i=>pad+(pts.length<=1?0:i/(pts.length-1)*(W-2*pad)), Y=v=>H-pad-((v-min)/rng)*(H-2*pad);
  const line=pts.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');

    <polyline points="${line}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/></svg>`;

function calCard(ts){
  const by={}; ts.forEach(t=>{const d=trDate(t);if(d)by[d]=(by[d]||0)+num(t.pnl);});
  const days=Object.keys(by); if(!days.length)return `<p class="muted">데이터 없음.</p>`;
  const s=new Date(days.reduce((a,b)=>a<b?a:b)+'T00:00:00Z'); s.setUTCDate(s.getUTCDate()-s.getUTCDay());
  const end=new Date(days.reduce((a,b)=>a>b?a:b)+'T00:00:00Z');
  const mx=Math.max(...Object.values(by).map(v=>Math.abs(v)),1); let cells='';
  for(let d=new Date(s); d<=end; d.setUTCDate(d.getUTCDate()+1)){
    const k=d.toISOString().slice(0,10), v=by[k]; let bg='var(--card-2)', tt=k;
    if(v!=null){const a=(.18+.62*Math.min(1,Math.abs(v)/mx)).toFixed(2);bg=v>=0?`rgba(59,191,166,${a})`:`rgba(228,109,76,${a})`;tt=`${k}: ${money(v)}`;}
    cells+=`<div class="cal-cell" style="background:${bg}" title="${esc(tt)}"></div>`;
  }

function sessionCard(ts){

  const mx=Math.max(...hp.map(v=>Math.abs(v)),1); let hours='';
  for(let h=0;h<24;h++){const v=hp[h];let bg='var(--card-2)',tt=`${String(h).padStart(2,'0')}:00 KST`;
    if(hn[h]){const a=(.18+.62*Math.min(1,Math.abs(v)/mx)).toFixed(2);bg=v>=0?`rgba(59,191,166,${a})`:`rgba(228,109,76,${a})`;tt+=` · ${money(v)} (${hn[h]}건)`;}
    hours+=`<div class="hcell" style="background:${bg}" title="${esc(tt)}">${h}</div>`;}
  // 글로벌 장세를 KST 시각으로 매핑(미국장은 자정 넘김)

  const sess=[['아시아장','09–17',9,17],['유럽장','17–22',17,22],['미국장','22–06',22,6],['그 외','06–09',6,9]];

    return `<div class="srow"><span class="snm">${nm} <span class="muted">${lbl} KST</span></span><span class="num ${p>=0?'pos':'neg'}">${money(p)}</span><span class="muted num">${n}건</span></div>`;}).join('');
  return `<div class="card"><div class="hours">${hours}</div><div class="sess">${rows}</div><div class="ccap muted">한국시간(KST·UTC+9) 기준 · 위 칸 숫자=시(0~23시)</div></div>`;

function rHist(ts){
  const rs=ts.map(t=>t.r).filter(r=>r!=null);

  const B=[["≤-2",-1e9,-2],["-2~-1",-2,-1],["-1~0",-1,0],["0~1",0,1],["1~2",1,2],["2~3",2,3],[">3",3,1e9]];
  const cnt=B.map(([l,lo,hi])=>rs.filter(r=>r>lo&&r<=hi).length);
  const mx=Math.max(...cnt,1), W=600,H=170,pad=26,bw=(W-2*pad)/B.length;
  const bars=B.map((b,i)=>{const h=cnt[i]/mx*(H-2*pad-12),x=pad+i*bw,y=H-pad-h,neg=b[2]<=0;
    return `<rect x="${(x+5).toFixed(1)}" y="${y.toFixed(1)}" width="${(bw-10).toFixed(1)}" height="${Math.max(0,h).toFixed(1)}" rx="2" fill="${neg?'var(--neg)':'var(--pos)'}" opacity="0.85"/>`
      +`<text x="${(x+bw/2).toFixed(1)}" y="${H-pad+14}" text-anchor="middle" class="hx">${b[0]}</text>`
      +(cnt[i]?`<text x="${(x+bw/2).toFixed(1)}" y="${(y-5).toFixed(1)}" text-anchor="middle" class="hn">${cnt[i]}</text>`:"");
  }).join("");

    +`<div class="ccap muted">SL 입력 ${rs.length}건 · 평균 ${(avg>=0?'+':'')+avg.toFixed(2)}R · 빨강=손실 / 초록=수익</div></div>`;
}
function exitHabits(ts){

  const dist={};closed.forEach(t=>{const k=t.exit_reason;(dist[k]=dist[k]||{n:0,pnl:0});dist[k].n++;dist[k].pnl+=(t.pnl||0);});
  const LBL={sl_hit:"⛔ SL 적중",tp_hit:"🎯 TP 적중",trailing:"🎯 트레일링",manual:"✋ 수동 청산",liquidation:"⚡ 강제청산"};

    `<div class="srow"><span class="snm">${LBL[k]||esc(k)}</span><span class="muted num">${v.n}건</span><span class="num ${v.pnl>=0?'pos':'neg'}">${money(v.pnl)}</span></div>`).join("");

    +mcard("두고 온 이익",moneyLeft>0?"$"+Math.round(moneyLeft).toLocaleString():"—","","계획 익절 전 조기청산 누적")
    +`</div>`;

function behaviorPanel(ts){

    if(s===runSign)run++;else{runSign=s;run=1;} if(s>0)maxW=Math.max(maxW,run);else maxL=Math.max(maxL,run);});
  let cur=0,curSign=0;
  for(let i=ord.length-1;i>=0;i--){const s=(ord[i].pnl||0)>0?1:((ord[i].pnl||0)<0?-1:0);if(!s)continue;if(!curSign){curSign=s;cur=1;}else if(s===curSign)cur++;else break;}
  let revenge=0;

      const g=(new Date(b.closed_at.replace(' ','T')+'Z')-new Date(a.closed_at.replace(' ','T')+'Z'))/60000;if(g>=0&&g<=30)revenge++;}}

    +`</div>`;
}

}
function setBanner(html){const el=$("#pullbanner");if(el)el.innerHTML=html||'';}
function infoBanner(msg){setBanner(`<div class="banner info"><span class="spin"></span>${esc(msg)}</div>`);}
function setPullBanner(results){
  const errs=Object.entries(results||{}).filter(([k,v])=>v&&v.error);
  if(!errs.length){setBanner('');return;}
  setBanner(`<div class="banner err">⚠ ${errs.map(([k,v])=>`<b>${esc(k)}</b> ${esc(v.error)}`).join(' · ')}<button class="bx" aria-label="닫기">×</button></div>`);
  const bx=$("#pullbanner .bx");if(bx)bx.onclick=()=>setBanner('');
}
async function pull(opt){opt=opt||{};
  const b=$("#pullBtn")||$("#emptyPull"); const orig=b?b.textContent:"";
  if(b&&!opt.silent){b.disabled=true;b.textContent="적재 중…";}
  if(opt.banner)infoBanner(opt.banner);
  try{
    const res=await(await postJSON("/api/pull",{})).json();
    if(res.ok){
      await loadAll();route();
      const rs=res.results||{}; setPullBanner(rs);
      const ok=Object.entries(rs).filter(([k,v])=>!v.error);
      const added=ok.reduce((s,[k,v])=>s+(v.added||0),0);
      const anyErr=Object.values(rs).some(v=>v.error);
      if(opt.banner&&!anyErr) toast(added?`불러오기 완료 · 신규 ${added}건`:`최근 거래 없음 — 새 거래가 잡히면 자동 반영`);
      else if(!opt.silent) toast(ok.length?`적재: ${ok.map(([k,v])=>`${k} +${v.added}`).join(' · ')}`:`연결된 거래소 없음`);
    }else{setBanner('');toast(res.error||"적재 실패");}
  }catch(err){setBanner('');toast("적재 실패 — 키/연결을 확인하세요");}
  finally{const x=$("#pullBtn");if(x){x.disabled=false;x.textContent=orig||"↻ 적재";}}
}

function openBulk(){setChips("cb_strategy",[]);setChips("cb_emo",[]);$("#bulkMeta").textContent=`의도 미기입 ${DATA.summary.unplanned||0}건에 적용`;$("#shell").inert=true;$("#bulkBg").classList.add("show");$("#b_plan").focus();}
function closeBulk(){$("#bulkBg").classList.remove("show");$("#shell").inert=false;}
async function saveBulk(){const btn=$("#bulkSave");btn.disabled=true;
  try{const res=await(await postJSON("/api/intent/bulk",{plan:$("#b_plan").value,strategy:getChips("cb_strategy")[0]||"",emotion:getChips("cb_emo")[0]||""})).json();
    closeBulk();await loadAll();route();toast(`${res.filled||0}건 일괄 기입 완료`);}
  catch(e){toast("일괄 기입 실패 — 잠시 후 다시");}finally{btn.disabled=false;}}

$("#saveBtn").onclick=saveIntent;$("#cancelBtn").onclick=closeModal;
$("#bulkSave").onclick=saveBulk;$("#bulkCancel").onclick=closeBulk;
chipsInto("c_strategy",STRATS,false);chipsInto("c_setup",RATIONALES,true);chipsInto("c_emo",EMOS,false);
chipsInto("cb_strategy",STRATS,false);chipsInto("cb_emo",EMOS,false);
$("#f_sl").oninput=updateRR;$("#f_tp").oninput=updateRR;$("#f_tp2").oninput=updateRR;
$("#modalBg").onclick=e=>{if(e.target===$("#modalBg"))closeModal();};
$("#bulkBg").onclick=e=>{if(e.target===$("#bulkBg"))closeBulk();};
document.addEventListener("keydown",e=>{if(e.key!=="Escape")return;if($("#modalBg").classList.contains("show"))closeModal();else if($("#bulkBg").classList.contains("show"))closeBulk();});
window.addEventListener("hashchange",route);
(async()=>{paintBootSkeleton();try{await loadAll();route();}catch(e){$("#view-dashboard").innerHTML='<div class="empty"><div class="em">⚠️</div><h2>불러오기 실패</h2><p>새로고침 해주세요.</p><button class="btn primary" onclick="location.reload()">새로고침</button></div>';}})();
</script></body></html>
