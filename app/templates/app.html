<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>매매일지</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/app.css">
</head><body>
<a class="sr-only" href="#main">본문 바로가기</a>
<div class="shell" id="shell">
  <aside class="side">
    <div class="brand">📓 매매일지</div>
    <nav class="nav" aria-label="주 메뉴">
      <a href="#dashboard" data-view="dashboard"><span class="ic" aria-hidden="true">📊</span>대시보드</a>
      <a href="#journal" data-view="journal"><span class="ic" aria-hidden="true">📒</span>거래</a>
      <a href="#insights" data-view="insights"><span class="ic" aria-hidden="true">🧠</span>인사이트</a>
      <a href="#settings" data-view="settings"><span class="ic" aria-hidden="true">⚙️</span>설정</a>
    </nav>
    <div class="foot"><div class="email" id="email">—</div><a href="/logout">로그아웃</a></div>
  </aside>
  <main class="main" id="main">
    <div class="topbar">
      <div><h1 id="title">대시보드</h1><div class="desc" id="desc"></div></div>
      <div id="actions"></div>
    </div>
    <div id="pullbanner"></div>
    <div class="content">
      <section id="view-dashboard" class="view" aria-live="polite"></section>
      <section id="view-journal" class="view" hidden></section>
      <section id="view-insights" class="view" hidden></section>
      <section id="view-settings" class="view" hidden></section>
    </div>
  </main>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalMeta">
  <h3 id="modalTitle">거래 상세 · 사후 의도</h3><div class="meta" id="modalMeta"></div>
  <div class="facts" id="modalFacts"></div>
  <div class="field"><label for="f_plan">계획/의도 — 왜 들어갔나</label><textarea id="f_plan" placeholder="예: 0.087 지지선 반등 베팅, 4시간 추세 눌림목"></textarea></div>
  <div class="row2">
    <div class="field"><label for="f_strategy">진입전략</label><select id="f_strategy">
      <option value="">—</option><option>추세추종</option><option>눌림목(되돌림)</option><option>돌파(브레이크아웃)</option><option>역추세(리버설)</option><option>레인지</option><option>스캘핑</option><option>뉴스·이벤트</option><option>기타</option></select></div>
    <div class="field"><label for="f_setup">진입근거 / 셋업</label><input id="f_setup" placeholder="추세선 지지 · 4H 다이버전스 · 거래량"></div>
  </div>
  <div class="row3">
    <div class="field"><label for="f_sl">손절가 (SL)</label><input id="f_sl" type="number" step="any" placeholder="0.086"></div>
    <div class="field"><label for="f_tp">익절가 1 (TP1)</label><input id="f_tp" type="number" step="any" placeholder="0.092"></div>
    <div class="field"><label for="f_tp2">익절가 2 (TP2)</label><input id="f_tp2" type="number" step="any" placeholder="0.098"></div>
  </div>
  <div class="rr-line" id="rrLine"></div>
  <div class="field"><label for="f_emo">감정</label><select id="f_emo">
    <option value="">—</option><option>차분</option><option>확신</option><option>조급</option><option>공포</option><option>탐욕</option><option>지루함</option></select></div>
  <div class="field"><label for="f_memo">메모</label><textarea id="f_memo" placeholder="물려서 분할로 던짐 / 손절 못 지킴…"></textarea></div>
  <div class="modal-actions"><button class="btn ghost" id="cancelBtn">취소</button><button class="btn primary" id="saveBtn">저장 · 기록완료</button></div>
</div></div>

<div id="toast" role="status" aria-live="polite" style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--plate);border:1px solid var(--line-2);color:var(--ice);padding:10px 16px;border-radius:8px;box-shadow:var(--card-elev);display:none;z-index:50;font-size:13px"></div>

<script>
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
let DATA={summary:{},trades:[]}, CONN=[], EDIT=null, LAST_FOCUS=null, SAVING=false;
let MARKET=null, MKT_LOADING=false;
let JT={from:'',to:'',q:'',exchange:'all',dir:'all',status:'all',sortKey:'closed_at',sortDir:'desc',page:1,size:25}, jtDebounce;
const money=n=>n==null?"—":(Number(n)>=0?"+":"")+Number(n).toFixed(2);
const fmtP=n=>(n==null||n==='')?'<span class="muted">—</span>':Number(n).toLocaleString(undefined,{maximumFractionDigits:8});
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const EXCH=new Set(["bybit","binance"]);
let toastT;
function toast(msg){const t=$("#toast");t.textContent=msg;t.style.display="block";clearTimeout(toastT);toastT=setTimeout(()=>t.style.display="none",3200);}

async function api(path,opt){
  const r=await fetch(path,opt);
  if(r.status===401){location.href="/login";throw new Error("auth");}
  if(!r.ok) throw new Error("http "+r.status);
  return r;
}
function postJSON(path,body){return api(path,{method:"POST",headers:{"Content-Type":"application/json","X-Requested-With":"fetch"},body:JSON.stringify(body||{})});}

const VIEWS={
  dashboard:{title:"대시보드",desc:"오늘의 거래와 행동 패턴 개요",actions:pullActions,render:renderDashboard},
  journal:{title:"거래",desc:"전체 거래 · 계획 사후 입력",actions:pullActions,render:renderJournal},
  insights:{title:"인사이트",desc:"행동 패턴과 종목별 성과",actions:()=>"",render:renderInsights},
  settings:{title:"설정",desc:"거래소·Notion·Sheets·Telegram 연동",actions:()=>"",render:renderSettings},
};
function pullActions(){return `<button class="btn" id="pullBtn">↻ 적재</button> <button class="btn primary" id="refreshBtn" style="margin-left:8px">새로고침</button>`;}

async function loadAll(){
  const [me,data,conn]=await Promise.all([
    api("/api/me").then(r=>r.json()), api("/api/data").then(r=>r.json()), api("/api/connections").then(r=>r.json())]);
  $("#email").textContent=me.email||""; DATA=data; CONN=conn.connected||[];
}
function route(){
  const v=(location.hash.replace("#","")||"dashboard"); const view=VIEWS[v]?v:"dashboard";
  $$(".nav a").forEach(a=>{if(a.dataset.view===view)a.setAttribute("aria-current","page");else a.removeAttribute("aria-current");});
  $("#title").textContent=VIEWS[view].title; $("#desc").textContent=VIEWS[view].desc;
  $("#actions").innerHTML=VIEWS[view].actions();
  $$(".view").forEach(s=>s.hidden=true); $("#view-"+view).hidden=false;
  VIEWS[view].render($("#view-"+view));
  if($("#pullBtn"))$("#pullBtn").onclick=pull; if($("#refreshBtn"))$("#refreshBtn").onclick=refresh;
}
async function refresh(){try{await loadAll();route();}catch(e){toast("불러오기 실패 — 새로고침 해주세요");}}

/* ---------- views ---------- */
function statCards(s){
  const c=[["총 거래",(s.n||0)+"건",""],["실현손익",money(s.total_pnl)+" USDT",(s.total_pnl||0)>=0?"pos":"neg"],
    ["승률",s.n?Math.round((s.win_rate||0)*100)+"% ("+(s.wins||0)+"/"+s.n+")":"—",""],["의도 미기입",(s.unplanned||0)+"건",(s.unplanned||0)>0?"neg":""]];
  return `<div class="cards">`+c.map(x=>`<div class="card stat"><div class="label">${x[0]}</div><div class="val ${x[2]}">${x[1]}</div></div>`).join("")+`</div>`;
}
function flagsBlock(s){return (s.flags||[]).length?`<div class="flags">`+s.flags.map(f=>`<div class="flag">${esc(f)}</div>`).join("")+`</div>`:"";}
function onboarding(){
  const hasExch=CONN.some(k=>EXCH.has(k));
  return `<div class="empty"><div class="em" aria-hidden="true">${hasExch?"🌱":"🔌"}</div>
    <h2>${hasExch?"아직 거래가 없어요":"거래소를 연결하면 시작돼요"}</h2>
    <p>${hasExch?"최근 거래가 잡히면 여기 자동으로 들어옵니다. 지금 한번 긁어볼까요?":"read-only 키만 연결하면 청산 거래가 자동으로 일지에 들어오고, 계획 없던 거래는 따로 잡아둡니다."}</p>
    ${hasExch?`<button class="btn primary" id="emptyPull">↻ 거래 적재</button>`:`<a class="btn primary" href="#settings">거래소 연결하기</a>`}</div>`;
}
function tradeRows(rows){
  return rows.map(r=>{
    const dir=r.direction?`<span class="badge ${r.direction==='Long'?'long':'short'}">${esc(r.direction)}</span>`:"—";
    const st=r.status==='의도 미기입'?`<span class="badge pending">의도 미기입</span>`:`<span class="badge done">${esc(r.status||'기록')}</span>`;
    const rcell=r.r==null?'<span class="muted">—</span>':`<span class="${r.r>=0?'pos':'neg'}">${(r.r>=0?'+':'')+r.r}R</span>`;
    const liq=r.liquidated?` <span class="badge liq" title="강제청산/ADL">⚡청산</span>`:'';
    const lev=r.leverage?` <span class="ex">${r.leverage}x</span>`:'';
    return `<tr><td class="num">${esc((r.closed_at||'').slice(0,16))}</td>
      <td>${esc(r.symbol)} <span class="ex">${esc(r.exchange)}</span>${lev}${liq}</td><td>${dir}</td>
      <td class="num">${fmtP(r.entry)}</td><td class="num">${fmtP(r.exit)}</td>
      <td class="num ${(r.pnl||0)>=0?'pos':'neg'}">${money(r.pnl)}</td><td class="num">${rcell}</td><td>${st}</td>
      <td><button class="btn sm editBtn" data-id="${esc(r.trade_id)}">${r.plan?'편집':'채우기'}</button></td></tr>`;
  }).join("");
}
const TCOLS=[['closed_at','청산시각','num'],['symbol','심볼',''],['direction','방향',''],
  ['entry','진입가','num'],['exit','청산가','num'],['pnl','손익','num'],['r','R','num'],['status','상태','']];
function table(rows,opts){
  opts=opts||{};
  const th=TCOLS.map(c=>{
    if(!opts.sortable)return `<th class="${c[2]}">${c[1]}</th>`;
    const on=JT.sortKey===c[0], arr=on?(JT.sortDir==='desc'?'▼':'▲'):'';
    return `<th class="${c[2]} sortable" data-sort="${c[0]}" aria-sort="${on?(JT.sortDir==='desc'?'descending':'ascending'):'none'}">${c[1]}<span class="sarr">${arr}</span></th>`;
  }).join('')+`<th></th>`;
  return `<div class="table-wrap"><table><thead><tr>${th}</tr></thead><tbody>${tradeRows(rows)}</tbody></table></div>`;
}
function bindEdit(){$$(".editBtn").forEach(b=>b.onclick=()=>openModal(b.dataset.id));}

/* ---------- 시장 컨텍스트 스트립 ---------- */
const TREND={up:["▲","상승","pos"],down:["▼","하락","neg"],side:["▬","횡보","muted"]};
function chgTxt(v){return v==null?"":`<span class="${v>=0?'pos':'neg'}">${(v>=0?'+':'')+v}%</span>`;}
function usd(n){return n==null?"—":"$"+Number(n).toLocaleString(undefined,{maximumFractionDigits:n<10?4:0});}
function fngKo(v){if(v==null)return["—","muted"];if(v<25)return["극단적 공포","neg"];if(v<45)return["공포","neg"];if(v<=55)return["중립","muted"];if(v<=75)return["탐욕","pos"];return["극단적 탐욕","pos"];}
function mchip(label,main,sub,cls){return `<div class="mchip"><div class="mk">${label}</div><div class="mv ${cls||''}">${main}</div>${sub?`<div class="ms">${sub}</div>`:""}</div>`;}
function marketStrip(m){
  if(!m)return `<div class="market" id="marketStrip"><div class="mchip skel">시장 데이터 불러오는 중…</div></div>`;
  const chips=[];
  if(m.btc){const t=TREND[m.btc.trend]||["·","—","muted"];
    chips.push(mchip("비트코인 추세",`<span class="${t[2]}">${t[0]} ${t[1]}</span>`,`${usd(m.btc.price)} · 24h ${chgTxt(m.btc.chg24)}`));}
  if(m.eth)chips.push(mchip("이더리움",usd(m.eth.price),`24h ${chgTxt(m.eth.chg24)} · 7d ${chgTxt(m.eth.chg7)}`));
  if(m.fng){const f=fngKo(m.fng.value);chips.push(mchip("공포·탐욕 지수",`<span class="${f[1]}">${m.fng.value} · ${f[0]}</span>`,"시장 심리 (alt.me)"));}
  if(m.dom)chips.push(mchip("BTC 도미넌스",`${m.dom.btc}%`,`전체 시총 24h ${chgTxt(m.dom.mcap_chg)}`));
  if(!chips.length)return `<div class="market" id="marketStrip"><div class="mchip skel">시장 데이터 일시 불가</div></div>`;
  return `<div class="market" id="marketStrip">${chips.join("")}</div>`;
}
async function ensureMarket(){
  const e=$("#marketStrip"); if(!e)return;
  if(MARKET){e.outerHTML=marketStrip(MARKET);return;}
  if(MKT_LOADING)return; MKT_LOADING=true;
  try{MARKET=await(await api("/api/market")).json();}catch(err){MARKET={};}
  MKT_LOADING=false; const el2=$("#marketStrip"); if(el2)el2.outerHTML=marketStrip(MARKET);
}

function renderDashboard(el){
  const strip=marketStrip(MARKET);
  if(!DATA.trades.length){el.innerHTML=strip+onboarding();const ep=$("#emptyPull");if(ep)ep.onclick=pull;ensureMarket();return;}
  el.innerHTML=strip+statCards(DATA.summary)+`<div class="section-title">행동 인사이트</div>`+(flagsBlock(DATA.summary)||`<p class="muted">플래그 없음 — 깔끔합니다.</p>`)
    +`<div class="section-title">최근 거래</div>`+table(DATA.trades.slice(0,6));
  bindEdit();ensureMarket();
}
function iso(d){return d.toISOString().slice(0,10);}
function chipGroup(field,opts){return opts.map(([v,label])=>`<button class="btn sm fchip" data-field="${field}" data-val="${esc(v)}" ${JT[field]===v?'aria-current="page"':''}>${esc(label)}</button>`).join('');}
function jtMatch(t){
  const day=(t.closed_at||'').slice(0,10);
  if(JT.from&&day<JT.from)return false;
  if(JT.to&&day>JT.to)return false;
  if(JT.exchange!=='all'&&t.exchange!==JT.exchange)return false;
  if(JT.dir!=='all'&&t.direction!==JT.dir)return false;
  if(JT.status==='pending'&&t.status!=='의도 미기입')return false;
  if(JT.status==='done'&&t.status==='의도 미기입')return false;
  if(JT.q){const hay=[t.symbol,t.strategy,t.setup,t.plan,t.memo,t.emotion].join(' ').toLowerCase();if(!hay.includes(JT.q.toLowerCase()))return false;}
  return true;
}
function jtCmp(a,b){
  const k=JT.sortKey, num=['entry','exit','pnl','r','qty','leverage'].includes(k);
  let av=a[k],bv=b[k];
  if(num){av=av==null?-Infinity:Number(av);bv=bv==null?-Infinity:Number(bv);}
  else{av=av==null?'':String(av);bv=bv==null?'':String(bv);}
  const c=av<bv?-1:av>bv?1:0;
  return JT.sortDir==='desc'?-c:c;
}
function renderPager(k,pages){
  const el=$("#jPager");if(!el)return;
  if(k<=JT.size){el.innerHTML='';return;}
  const s=(JT.page-1)*JT.size+1, e=Math.min(k,JT.page*JT.size);
  el.innerHTML=`<button class="btn sm" id="pgPrev" ${JT.page<=1?'disabled':''}>‹ 이전</button>
    <span class="pginfo">${s}–${e} / 총 ${k}건</span>
    <button class="btn sm" id="pgNext" ${JT.page>=pages?'disabled':''}>다음 ›</button>`;
  if($("#pgPrev"))$("#pgPrev").onclick=()=>{JT.page--;applyJournal();};
  if($("#pgNext"))$("#pgNext").onclick=()=>{JT.page++;applyJournal();};
}
function applyJournal(){
  if(!$("#jt"))return;
  const rows=DATA.trades.filter(jtMatch).sort(jtCmp);
  const k=rows.length, total=rows.reduce((s,t)=>s+(t.pnl||0),0);
  const pages=Math.max(1,Math.ceil(k/JT.size));
  if(JT.page>pages)JT.page=pages;
  const start=(JT.page-1)*JT.size;
  $("#jt").innerHTML=k?table(rows.slice(start,start+JT.size),{sortable:true})
    :`<div class="empty-sm muted">조건에 맞는 거래 없음 — 필터를 완화해보세요.</div>`;
  $("#jSummary").innerHTML=`결과 <b>${k}</b>건 · 합산손익 <b class="${total>=0?'pos':'neg'}">${money(total)}</b> USDT`;
  renderPager(k,pages);
  bindEdit();
  $$("#jt th.sortable").forEach(th=>th.onclick=()=>{const c=th.dataset.sort;
    if(JT.sortKey===c)JT.sortDir=JT.sortDir==='desc'?'asc':'desc';
    else{JT.sortKey=c;JT.sortDir=(c==='closed_at'||c==='pnl'||c==='r')?'desc':'asc';}
    applyJournal();});
}
function renderJournal(el){
  if(!DATA.trades.length){el.innerHTML=onboarding();const ep=$("#emptyPull");if(ep)ep.onclick=pull;return;}
  const exs=[...new Set(DATA.trades.map(t=>t.exchange).filter(Boolean))];
  el.innerHTML=`<div class="jbar">
      <input type="date" id="jFrom" value="${JT.from}" aria-label="시작일">
      <span class="muted">~</span>
      <input type="date" id="jTo" value="${JT.to}" aria-label="종료일">
      <button class="btn sm jpreset" data-d="0">오늘</button>
      <button class="btn sm jpreset" data-d="7">7일</button>
      <button class="btn sm jpreset" data-d="30">30일</button>
      <input type="search" id="jQ" value="${esc(JT.q)}" placeholder="심볼·전략·메모 검색" aria-label="검색">
      <select id="jSize" aria-label="페이지당 행수"><option value="25">25개</option><option value="50">50개</option><option value="100">100개</option></select>
      <button class="btn sm" id="jReset">초기화</button>
    </div>
    <div class="jbar">
      <span class="cgrp" id="jEx"></span><span class="cgrp" id="jDir"></span><span class="cgrp" id="jStat"></span>
      <span class="jsum" id="jSummary"></span>
    </div>
    <div id="jt"></div><div class="pager" id="jPager"></div>`;
  $("#jEx").innerHTML=chipGroup('exchange',[['all','전체'],...exs.map(e=>[e,e])]);
  $("#jDir").innerHTML=chipGroup('dir',[['all','전체'],['Long','Long'],['Short','Short']]);
  $("#jStat").innerHTML=chipGroup('status',[['all','전체'],['pending','미기입 '+(DATA.summary.unplanned||0)],['done','기록완료']]);
  $("#jSize").value=String(JT.size);
  $("#jFrom").onchange=e=>{JT.from=e.target.value;JT.page=1;applyJournal();};
  $("#jTo").onchange=e=>{JT.to=e.target.value;JT.page=1;applyJournal();};
  $("#jQ").oninput=e=>{clearTimeout(jtDebounce);const v=e.target.value;jtDebounce=setTimeout(()=>{JT.q=v;JT.page=1;applyJournal();},180);};
  $("#jSize").onchange=e=>{JT.size=Number(e.target.value);JT.page=1;applyJournal();};
  $("#jReset").onclick=()=>{JT={from:'',to:'',q:'',exchange:'all',dir:'all',status:'all',sortKey:'closed_at',sortDir:'desc',page:1,size:JT.size};renderJournal(el);};
  $$(".jpreset").forEach(b=>b.onclick=()=>{const days=+b.dataset.d;JT.to=iso(new Date());JT.from=iso(new Date(Date.now()-days*86400000));JT.page=1;$("#jFrom").value=JT.from;$("#jTo").value=JT.to;applyJournal();});
  $$(".fchip").forEach(b=>b.onclick=()=>{JT[b.dataset.field]=b.dataset.val;JT.page=1;
    $$(`.fchip[data-field="${b.dataset.field}"]`).forEach(x=>x.removeAttribute("aria-current"));b.setAttribute("aria-current","page");applyJournal();});
  applyJournal();
}
function groupTable(keyFn,head,asc){
  const by={};DATA.trades.forEach(t=>{const k=keyFn(t);if(k==null)return;(by[k]=by[k]||{n:0,pnl:0,w:0});by[k].n++;by[k].pnl+=(t.pnl||0);if((t.pnl||0)>0)by[k].w++;});
  const ks=Object.entries(by).sort((a,b)=>asc?a[1].pnl-b[1].pnl:b[1].pnl-a[1].pnl);
  if(!ks.length)return"";
  const rows=ks.map(([k,v])=>`<tr><td>${esc(k)}</td><td class="num">${v.n}</td><td class="num ${v.pnl>=0?'pos':'neg'}">${money(v.pnl)}</td><td class="num">${Math.round(v.w/v.n*100)}%</td></tr>`).join("");
  return `<div class="table-wrap"><table><thead><tr><th>${head}</th><th class="num">거래수</th><th class="num">실현손익</th><th class="num">승률</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function renderInsights(el){
  if(!DATA.trades.length){el.innerHTML=onboarding();return;}
  const stratTbl=groupTable(t=>t.strategy,"전략",false);
  el.innerHTML=`<div class="section-title">행동 패턴</div>`+(flagsBlock(DATA.summary)||`<p class="muted">플래그 없음.</p>`)
    +(stratTbl?`<div class="section-title">전략별 성과 (수익 큰 순)</div>`+stratTbl
      :`<div class="section-title">전략별 성과</div><p class="muted">거래에 진입전략을 기입하면 전략별 손익·승률이 여기 모입니다.</p>`)
    +`<div class="section-title">종목별 성과 (손실 큰 순)</div>`+groupTable(t=>t.symbol||"?","심볼",true);
}
const CONN_DEFS=[
  {k:"bybit",nm:"Bybit",hint:"read-only 키 (주문·출금 OFF)",read:1,fields:[["key","API Key","text"],["secret","API Secret","password"]]},
  {k:"binance",nm:"Binance",hint:"USDⓈ-M 선물 read-only 키",read:1,fields:[["key","API Key","text"],["secret","API Secret","password"]]},
  {k:"notion",nm:"Notion",hint:"일지를 Notion에 미러 (출력 연동은 준비 중)",fields:[["token","Integration 토큰","password"],["extra","DB id","text"]]},
  {k:"telegram",nm:"Telegram",hint:"행동 다이제스트 푸시 (출력 연동은 준비 중)",fields:[["token","봇 토큰","password"],["extra","chat id","text"]]},
  {k:"sheets",nm:"Google Sheets",hint:"일지를 시트에 미러 (출력 연동은 준비 중)",fields:[["token","서비스계정 JSON","password"],["extra","sheet id","text"]]},
];
function renderSettings(el){
  el.innerHTML=`<div class="grid">`+CONN_DEFS.map((d,di)=>{
    const on=CONN.includes(d.k);
    return `<div class="card"><div class="conn"><div>
        <div class="nm"><span class="dot ${on?'on':''}"></span>${d.nm}${d.read?`<span class="read-tag">read-only</span>`:""}</div>
        <div class="hint">${d.hint}</div></div>
        ${on?`<button class="btn sm delBtn" data-k="${d.k}">연결 해제</button>`:""}</div>
      <form class="connForm" data-k="${d.k}" style="margin-top:14px">
        ${d.fields.map((f,fi)=>{const id=`c_${d.k}_${f[0]}`;return `<label class="sr-only" for="${id}">${d.nm} ${f[1]}</label><input id="${id}" name="${f[0]}" type="${f[2]||'text'}" placeholder="${f[1]}" autocomplete="off">`;}).join("")}
        <button class="btn primary sm" type="submit">${on?'업데이트':'연결'}</button>
      </form></div>`;
  }).join("")+`</div>
    <div class="section-title">계정</div><div class="card"><div class="conn">
      <div><div class="nm" id="acctEmail"></div><div class="hint">키·시크릿은 암호화되어 저장됩니다 (평문 미저장).</div></div>
      <a class="btn sm" href="/logout">로그아웃</a></div></div>`;
  $("#acctEmail").textContent=$("#email").textContent;
  $$(".connForm").forEach(f=>f.onsubmit=async e=>{e.preventDefault();
    const btn=f.querySelector("button");const body={kind:f.dataset.k};
    [...f.elements].forEach(i=>{if(i.name)body[i.name]=i.value;});
    btn.disabled=true;const orig=btn.textContent;btn.textContent="저장 중…";
    try{await postJSON("/api/connections",body);await loadAll();route();toast("연결 저장됨");}
    catch(err){toast("저장 실패 — 입력값을 확인하세요");btn.disabled=false;btn.textContent=orig;}});
  $$(".delBtn").forEach(b=>b.onclick=async()=>{
    b.disabled=true;
    try{await postJSON("/api/connections/delete",{kind:b.dataset.k});await loadAll();route();}
    catch(err){toast("해제 실패");b.disabled=false;}});
}

/* ---------- actions ---------- */
function tById(id){return DATA.trades.find(t=>t.trade_id===id);}
function fact(label,val){return `<div class="fact"><span class="fl">${label}</span><span class="fv num">${val}</span></div>`;}
function fmtHold(m){m=Math.round(m);if(m<60)return m+'분';const h=Math.floor(m/60),mm=m%60;if(h<24)return h+'시간'+(mm?` ${mm}분`:'');const d=Math.floor(h/24);return d+'일 '+(h%24)+'시간';}
function renderFacts(r){
  const mv=r.move_pct==null?'<span class="muted">—</span>':`<span class="${r.move_pct>=0?'pos':'neg'}">${(r.move_pct>=0?'+':'')+r.move_pct}%</span>`;
  const rr=r.r==null?'<span class="muted">—</span>':`<span class="${r.r>=0?'pos':'neg'}">${(r.r>=0?'+':'')+r.r}R</span>`;
  let h=fact("진입가",fmtP(r.entry))+fact("청산가",fmtP(r.exit))+fact("수량",fmtP(r.qty))
    +fact("가격변동",mv)+fact("실현손익",`<span class="${(r.pnl||0)>=0?'pos':'neg'}">${money(r.pnl)}</span>`)+fact("실현 R",rr)
    +fact("레버리지",r.leverage?r.leverage+'x':'—')+fact("보유시간",r.hold_min==null?'—':fmtHold(r.hold_min))
    +fact("분할 체결",r.fill_count?r.fill_count+'회':'—');
  if(r.fees!=null)h+=fact("수수료",`-$${Number(r.fees).toLocaleString(undefined,{maximumFractionDigits:2})}`);
  if(r.funding)h+=fact("펀딩",`<span class="${r.funding>=0?'pos':'neg'}">${money(r.funding)}</span>`);
  $("#modalFacts").innerHTML=h;
}
function updateRR(){
  if(!EDIT)return; const e=EDIT.entry,x=EDIT.exit,d=EDIT.direction,qty=EDIT.qty;
  const sl=parseFloat($("#f_sl").value), tp=parseFloat($("#f_tp").value), tp2=parseFloat($("#f_tp2").value);
  const p=[];
  if(e&&x&&!isNaN(sl)&&e!==sl){const r=d==='Short'?(e-x)/(sl-e):(x-e)/(e-sl);p.push(`실현 <b class="${r>=0?'pos':'neg'}">${(r>=0?'+':'')+r.toFixed(2)}R</b>`);}
  if(e&&!isNaN(sl)&&qty)p.push(`리스크 <b>$${(Math.abs(e-sl)*qty).toLocaleString(undefined,{maximumFractionDigits:1})}</b>`);
  if(e&&!isNaN(sl)&&!isNaN(tp)&&e!==sl)p.push(`TP1 손익비 <b>1:${(Math.abs(tp-e)/Math.abs(e-sl)).toFixed(1)}</b>`);
  if(e&&!isNaN(sl)&&!isNaN(tp2)&&e!==sl)p.push(`TP2 손익비 <b>1:${(Math.abs(tp2-e)/Math.abs(e-sl)).toFixed(1)}</b>`);
  $("#rrLine").innerHTML=p.join(' · ');
}
function openModal(id){const r=tById(id);if(!r)return;EDIT=r;LAST_FOCUS=document.activeElement;
  const liq=r.liquidated?' · ⚡강제청산':'';
  $("#modalMeta").textContent=`${r.exchange} · ${r.symbol} ${r.direction||''} · ${(r.closed_at||'').slice(0,16)}${liq}`;
  renderFacts(r);
  $("#f_plan").value=r.plan||"";$("#f_setup").value=r.setup||"";$("#f_strategy").value=r.strategy||"";$("#f_sl").value=r.sl??"";$("#f_tp").value=r.tp??"";$("#f_tp2").value=r.tp2??"";$("#f_emo").value=r.emotion||"";$("#f_memo").value=r.memo||"";
  updateRR();
  $("#shell").inert=true; $("#modalBg").classList.add("show"); $("#f_plan").focus();}
function closeModal(){$("#modalBg").classList.remove("show");$("#shell").inert=false;EDIT=null;if(LAST_FOCUS)LAST_FOCUS.focus();}
async function saveIntent(){
  if(!EDIT||SAVING)return; SAVING=true; const btn=$("#saveBtn");btn.disabled=true;
  const p={trade_id:EDIT.trade_id,plan:$("#f_plan").value,setup:$("#f_setup").value,strategy:$("#f_strategy").value,sl:$("#f_sl").value,tp:$("#f_tp").value,tp2:$("#f_tp2").value,emotion:$("#f_emo").value,memo:$("#f_memo").value};
  try{
    const res=await(await postJSON("/api/intent",p)).json();
    if(res.ok){closeModal();await loadAll();route();toast("저장됨");}else toast("저장 실패 — 거래를 찾지 못했어요");
  }catch(err){toast("저장 실패 — 잠시 후 다시");}
  finally{SAVING=false;btn.disabled=false;}
}
function setPullBanner(results){
  const el=$("#pullbanner");if(!el)return;
  const errs=Object.entries(results||{}).filter(([k,v])=>v&&v.error);
  if(!errs.length){el.innerHTML='';return;}
  el.innerHTML=`<div class="banner err">⚠ ${errs.map(([k,v])=>`<b>${esc(k)}</b> ${esc(v.error)}`).join(' · ')}<button class="bx" aria-label="닫기">×</button></div>`;
  el.querySelector('.bx').onclick=()=>{el.innerHTML='';};
}
async function pull(){
  const b=$("#pullBtn")||$("#emptyPull"); const orig=b?b.textContent:"";
  if(b){b.disabled=true;b.textContent="적재 중…";}
  try{
    const res=await(await postJSON("/api/pull",{})).json();
    if(res.ok){
      await loadAll();route();
      const rs=res.results||{};
      setPullBanner(rs);
      const parts=Object.entries(rs).map(([k,v])=>v.error?`${k} 실패`:`${k} +${v.added}`);
      toast(parts.length?`적재: ${parts.join(' · ')}`:`적재 완료 (신규 ${res.fetched??0}건) — 연결된 거래소 없음`);
    }else toast(res.error||"적재 실패");
  }catch(err){toast("적재 실패 — 키/연결을 확인하세요");}
  finally{const x=$("#pullBtn");if(x){x.disabled=false;x.textContent=orig||"↻ 적재";}}
}

$("#saveBtn").onclick=saveIntent;$("#cancelBtn").onclick=closeModal;
$("#f_sl").oninput=updateRR;$("#f_tp").oninput=updateRR;$("#f_tp2").oninput=updateRR;
$("#modalBg").onclick=e=>{if(e.target===$("#modalBg"))closeModal();};
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&$("#modalBg").classList.contains("show"))closeModal();});
window.addEventListener("hashchange",route);
(async()=>{try{await loadAll();route();}catch(e){$("#view-dashboard").innerHTML='<div class="empty"><div class="em">⚠️</div><h2>불러오기 실패</h2><p>새로고침 해주세요.</p><button class="btn primary" onclick="location.reload()">새로고침</button></div>';}})();
</script></body></html>
