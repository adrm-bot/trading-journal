<!-- @dsCard group="Components" -->
<!doctype html><html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../../../styles.css"></head>
<body style="padding:24px">
<div class="eyebrow" style="margin-bottom:10px">Stat card — 핵심 지표 (값은 mono/tabular, 손익은 세만틱 색)</div>
<div style="display:grid;grid-template-columns:repeat(3,220px);gap:12px">
  <div class="stat" style="background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);padding:16px;box-shadow:var(--inset)">
    <div class="label">합산 손익</div>
    <div class="val pos num">+9,180.24<span class="unit">USDT</span></div>
    <div class="msub">최근 90일 · 41건</div>
  </div>
  <div class="stat" style="background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);padding:16px;box-shadow:var(--inset)">
    <div class="label">승률</div>
    <div class="val num">54<span class="unit">%</span></div>
    <div class="msub">표본 41건</div>
  </div>
  <div class="stat" style="background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);padding:16px;box-shadow:var(--inset)">
    <div class="label">평균 R</div>
    <div class="val neg num">−0.31<span class="unit">R</span></div>
    <div class="msub">무효선 기입 거래만</div>
  </div>
</div>
</body></html>
